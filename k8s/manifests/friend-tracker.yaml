apiVersion: v1
kind: Namespace
metadata:
  name: friend-tracker
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: friend-tracker
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: friend-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        env:
        - name: POSTGRES_DB
          value: friendtracker
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: friend-tracker-db-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: friend-tracker
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: friend-tracker
  namespace: friend-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: friend-tracker
  template:
    metadata:
      labels:
        app: friend-tracker
    spec:
      initContainers:
      - name: migrate
        image: friend-tracker:latest
        imagePullPolicy: Never
        command: ["node_modules/.bin/prisma", "migrate", "deploy"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: friend-tracker-db-secret
              key: DATABASE_URL
      containers:
      - name: friend-tracker
        image: friend-tracker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: friend-tracker-db-secret
              key: DATABASE_URL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: friend-tracker
  namespace: friend-tracker
spec:
  selector:
    app: friend-tracker
  ports:
  - port: 3000
    targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: friend-tracker
  namespace: friend-tracker
spec:
  ingressClassName: nginx
  rules:
  - host: friend-tracker.home
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: friend-tracker
            port:
              number: 3000
  - host: friends.granzb.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: friend-tracker
            port:
              number: 3000
